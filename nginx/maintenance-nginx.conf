# ============================================================
# nginx maintenance mode — mevcut server bloğunuza ekleyin
# ============================================================
#
# KURULUM (Ubuntu sunucuda):
#   sudo cp maintenance.html /var/www/html/maintenance.html
#   sudo nano /etc/nginx/sites-available/rmm.talay.com
#   (aşağıdaki satırları mevcut server bloğuna ekleyin, sonra:)
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ---- Mevcut location / bloğuna EKLE ---- #

# 502/503/504 hatalarında maintenance sayfasını göster
error_page 502 503 504 /maintenance.html;

# Maintenance flag dosyası varsa (güncelleme sırasında), 503 döndür
# Böylece statik maintenance.html servis edilir
location = /maintenance.html {
    root /var/www/html;
    internal;
    add_header Cache-Control "no-cache, no-store";
    add_header Retry-After 30;
}

